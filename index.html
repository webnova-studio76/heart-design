<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Logic with Snow</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .label {
            position: absolute;
            top: 12%;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: lowercase;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="label">this is for you</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- THE HEART PARTICLES ---
        const count = 2500;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        const speeds = new Float32Array(count);
        const phases = new Float32Array(count);
        const colorChoices = [0xff2d55, 0xff3b30, 0xffffff, 0xff69b4];

        for (let i = 0; i < count; i++) {
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const variance = 1 + Math.random() * 0.15;
            positions[i * 3] = x * variance;
            positions[i * 3 + 1] = y * variance;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 2;

            const color = new THREE.Color(colorChoices[Math.floor(Math.random() * colorChoices.length)]);
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;

            speeds[i] = 1 + Math.random() * 2;
            phases[i] = Math.random() * Math.PI * 2;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const heartMaterial = new THREE.PointsMaterial({
            size: 0.12, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
        });
        const heart = new THREE.Points(geometry, heartMaterial);
        scene.add(heart);

        // --- SNOWFALL SYSTEM ---
        const snowCount = 1500;
        const snowGeometry = new THREE.BufferGeometry();
        const snowPositions = new Float32Array(snowCount * 3);
        
        for (let i = 0; i < snowCount; i++) {
            snowPositions[i * 3] = (Math.random() - 0.5) * 100;    
            snowPositions[i * 3 + 1] = (Math.random() - 0.5) * 100; 
            snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 100; 
        }

        snowGeometry.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
        const snowMaterial = new THREE.PointsMaterial({
            color: 0xffffff, size: 0.1, transparent: true, opacity: 0.5
        });
        const snow = new THREE.Points(snowGeometry, snowMaterial);
        scene.add(snow);

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        camera.position.z = 30;

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // Heart Animation
            heart.rotation.y = Math.sin(time * 0.5) * 0.2;
            const posAttr = heart.geometry.attributes.position;
            for (let i = 0; i < count; i++) {
                const p = phases[i] + time * speeds[i];
                posAttr.array[i * 3 + 2] = Math.sin(p) * 0.5;
            }
            posAttr.needsUpdate = true;

            // Snow Animation
            const snowAttr = snow.geometry.attributes.position;
            for (let i = 0; i < snowCount; i++) {
                snowAttr.array[i * 3 + 1] -= 0.05; 
                if (snowAttr.array[i * 3 + 1] < -50) {
                    snowAttr.array[i * 3 + 1] = 50;
                }
            }
            snowAttr.needsUpdate = true;

            // Pulsing logic for the heart
            const scale = 1 + Math.sin(time * 3) * 0.05;
            heart.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
